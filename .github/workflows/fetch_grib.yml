name: StrikeCAST – Gewitterwahrscheinlichkeit

on:
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # 1️⃣  Alles in einem Run
  # ─────────────────────────────────────────────
  strikecast:
    runs-on: ubuntu-latest
    outputs:
      run:  ${{ steps.meta.outputs.run }}
      date: ${{ steps.meta.outputs.date }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set DATE & RUN
        id: meta
        run: |
          HOUR=$(date -u +%H)
          case $HOUR in
            07|08|09|10|11|12|13) RUN=00 ;;
            19|20|21|22|23) RUN=12 ;;
          esac
          DATE=$(date -u +%Y%m%d)
          # set env variables
          echo "RUN=$RUN" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          # set step output for job output
          echo "run=$RUN" >> $GITHUB_OUTPUT

      - name: Download LUT
        run: |
          mkdir -p data/lut
          curl -L https://github.com/just1ncrx/StrikeCAST/releases/download/v1.0/lightning_lut.nc \
               -o data/lut/lightning_lut.nc
          curl -L https://github.com/just1ncrx/StrikeCAST/releases/download/v1.0/hail2cm_lut.nc \
               -o data/lut/hail2cm_lut.nc

      - name: Download Z
        run: |
          mkdir -p data/gewitter/z
          curl -L https://github.com/just1ncrx/StrikeCAST/releases/download/v1.1/z_step000.grib2 \
               -o data/gewitter/z/z_step000.grib2

      - name: Download ECMWF data
        run: |
          python download/download_all.py

      - name: Process – Prädiktoren berechnen
        run: python scripts/make_predict.py

      - name: Generate PNGs
        run: |
          mkdir -p pngs/gewitter pngs/hail2cm pngs/tornado
          python scripts/generate_gewitter.py
          python scripts/generate_hail2cm.py
          python scripts/generate_tornado.py

      - name: Upload PNGs artifact
        uses: actions/upload-artifact@v6
        with:
          name: strikecast-pngs
          path: pngs/
          retention-days: 1


  # ─────────────────────────────────────────────
  # 2️⃣  Deploy – wartet auf strikecast
  # ─────────────────────────────────────────────
  deploy_to_r2:
    runs-on: ubuntu-latest
    needs: strikecast

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download PNGs artifact
        uses: actions/download-artifact@v6
        with:
          name: strikecast-pngs
          path: pngs/

      - name: Generate metadata
        run: |
          python scripts/generate_metadata.py \
            ${{ needs.strikecast.outputs.run }} \
            ${{ needs.strikecast.outputs.date }}

      - name: Clean old runs on R2
        run: |
          CURRENT_RUN="${{ needs.strikecast.outputs.run }}"
          for folder in $(aws s3 ls s3://${{ secrets.R2_BUCKET }}/strikecast/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            | awk '{print $2}' | sed 's#/##'); do
            if [ "$folder" != "$CURRENT_RUN" ]; then
              aws s3 rm s3://${{ secrets.R2_BUCKET }}/strikecast/$folder \
                --recursive \
                --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
              echo "Gelöscht: $folder"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload PNGs and metadata.json to R2
        run: |
          RUN="${{ needs.strikecast.outputs.run }}"
          aws s3 sync pngs/gewitter/ \
            s3://${{ secrets.R2_BUCKET }}/strikecast/$RUN/gewitter/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

          aws s3 sync pngs/hail2cm/ \
            s3://${{ secrets.R2_BUCKET }}/strikecast/$RUN/hail2cm/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

          aws s3 sync pngs/tornado/ \
            s3://${{ secrets.R2_BUCKET }}/strikecast/$RUN/tornado/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

          aws s3 cp pngs/metadata.json \
            s3://${{ secrets.R2_BUCKET }}/strikecast/metadata.json \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
