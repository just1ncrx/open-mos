name: Fetch WarnMOS Short and Build OM

on:
  workflow_dispatch:

jobs:
  fetch_and_build:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.set_run_date.outputs.run }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set RUN and DATE
        id: set_run_date
        run: |
          HOUR=14
          DATE=$(date -u +%Y%m%d)
          RUN=$HOUR

          echo "RUN=$RUN" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV

          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

          echo "Current UTC time: $HOUR -> RUN=$RUN, DATE=$DATE"

      - name: Download WarnMOS Short GRB2
        run: |
          mkdir -p data/warnmos
          cd data/warnmos

          URL="https://opendata.dwd.de/weather/local_forecasts/warnmos/WarnMOS${DATE}${RUN}00.grb2.bz2"
          echo "Lade: $URL"

          wget -q -O warnmos_${DATE}${RUN}.grb2.bz2 "$URL" || echo "Datei nicht verfĂĽgbar, ĂĽberspringe..."
          if [ -f "warnmos_${DATE}${RUN}.grb2.bz2" ]; then
            bunzip2 -f warnmos_${DATE}${RUN}.grb2.bz2
          fi

      - name: Build OM + IDX
        run: |
          mkdir -p warnmos
          python scripts/build_om.py

      - name: Upload OM artifact
        uses: actions/upload-artifact@v4
        with:
          name: warnmos-om-short
          path: warnmos/

  deploy_to_r2:
    runs-on: ubuntu-latest
    needs: fetch_and_build
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download OM artifact
        uses: actions/download-artifact@v4
        with:
          name: warnmos-om-short
          path: warnmos/

      - name: Build Metadata
        run: python scripts/build_metadata.py

      - name: Clean old runs on R2
        run: |
          for run_folder in $(aws s3 ls s3://${{ secrets.R2_BUCKET }}/warnmos/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            | awk '{print $2}' | sed 's#/##'); do
            if [ "$run_folder" != "${{ needs.fetch_and_build.outputs.run }}" ]; then
              aws s3 rm s3://${{ secrets.R2_BUCKET }}/warnmos/$run_folder --recursive \
                --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
            fi
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload OM + IDX to R2
        run: |
          aws s3 sync ./warnmos/ s3://${{ secrets.R2_BUCKET }}/warnmos/${{ needs.fetch_and_build.outputs.run }}/ \
            --exclude "metadata.json" \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload Metadata to R2
        run: |
          aws s3 cp ./warnmos/metadata.json s3://${{ secrets.R2_BUCKET }}/warnmos/metadata.json \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
